<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none" role="img" aria-label="Actober AI">
  <!-- Icon mark: 80×80 -->
  <!-- 1 — Badge -->
  <rect width="80" height="80" rx="20" fill="#052424"/>
  <!-- 2 — Body -->
  <path d="M12 52 Q12 78 40 78 Q68 78 68 52 Z" fill="#F97316"/>
  <!-- 3 & 4 — Eyes -->
  <circle cx="24" cy="36" r="15" fill="#ffffff"/>
  <circle cx="56" cy="36" r="15" fill="#ffffff"/>
  <!-- 5 & 6 — Pupils -->
  <circle cx="27" cy="39" r="7.5" fill="#052424"/>
  <circle cx="53" cy="39" r="7.5" fill="#052424"/>
  <!-- 7 — Spine -->
  <line x1="40" y1="24" x2="40" y2="76" stroke="#052424" stroke-width="1.5" stroke-opacity="0.22"/>
  <!-- 8 — Spots -->
  <circle cx="27" cy="62" r="4.5" fill="#052424" fill-opacity="0.28"/>
  <circle cx="53" cy="62" r="4.5" fill="#052424" fill-opacity="0.28"/>

  <!-- Wordmark — dark mode ("ober" in dark teal) -->
  <text x="96" y="50"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700" font-size="34" letter-spacing="-0.5"
        fill="#F97316">Act</text>
  <text x="150" y="50"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700" font-size="34" letter-spacing="-0.5"
        fill="#052424">ober</text>
  <text x="98" y="66"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="400" font-size="10" letter-spacing="4"
        fill="#F97316" fill-opacity="0.70">AI GUIDANCE</text>
</svg>
