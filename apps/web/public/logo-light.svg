<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="Actober AI">
  <defs>
    <radialGradient id="bodyGL" cx="38%" cy="28%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FF9035"/>
      <stop offset="55%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C85C08"/>
    </radialGradient>
    <radialGradient id="eyeGL" cx="38%" cy="32%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8e8"/>
    </radialGradient>
    <radialGradient id="pupilGL" cx="35%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0e4040"/>
      <stop offset="100%" stop-color="#020e0e"/>
    </radialGradient>
    <filter id="badgeShadowL" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#F97316" flood-opacity="0.20"/>
    </filter>
    <filter id="eyeShadowL" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#052424" flood-opacity="0.25"/>
    </filter>
    <filter id="bodyShadowL" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7A2E00" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="2" y="2" width="76" height="76" rx="20" fill="#052424" filter="url(#badgeShadowL)"/>
  <rect x="3.5" y="3.5" width="73" height="73" rx="18.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- Body -->
  <ellipse cx="40" cy="56" rx="26" ry="22" fill="url(#bodyGL)" filter="url(#bodyShadowL)"/>
  <ellipse cx="40" cy="50" rx="24" ry="8" fill="none" stroke="rgba(255,200,120,0.22)" stroke-width="1.5"/>

  <!-- Left eye -->
  <circle cx="27" cy="38" r="13" fill="url(#eyeGL)" filter="url(#eyeShadowL)"/>
  <circle cx="27" cy="38" r="13" fill="none" stroke="rgba(5,36,36,0.12)" stroke-width="1.2"/>
  <circle cx="29" cy="40" r="6.5" fill="url(#pupilGL)"/>
  <circle cx="25" cy="35" r="2.8" fill="white"/>
  <circle cx="31" cy="43" r="1.1" fill="rgba(255,255,255,0.55)"/>

  <!-- Right eye -->
  <circle cx="53" cy="38" r="13" fill="url(#eyeGL)" filter="url(#eyeShadowL)"/>
  <circle cx="53" cy="38" r="13" fill="none" stroke="rgba(5,36,36,0.12)" stroke-width="1.2"/>
  <circle cx="51" cy="40" r="6.5" fill="url(#pupilGL)"/>
  <circle cx="49" cy="35" r="2.8" fill="white"/>
  <circle cx="55" cy="43" r="1.1" fill="rgba(255,255,255,0.55)"/>

  <!-- Nostrils -->
  <circle cx="37" cy="50" r="1.8" fill="rgba(5,36,36,0.28)"/>
  <circle cx="43" cy="50" r="1.8" fill="rgba(5,36,36,0.28)"/>

  <!-- Mouth -->
  <path d="M31 54 Q40 60 49 54" stroke="rgba(5,36,36,0.38)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Spine -->
  <line x1="40" y1="34" x2="40" y2="76" stroke="#052424" stroke-width="1.4" stroke-opacity="0.28"/>

  <!-- Spots -->
  <circle cx="28" cy="58" r="5"   fill="#052424" fill-opacity="0.30"/>
  <circle cx="52" cy="58" r="5"   fill="#052424" fill-opacity="0.30"/>
  <circle cx="30" cy="69" r="3.5" fill="#052424" fill-opacity="0.20"/>
  <circle cx="50" cy="69" r="3.5" fill="#052424" fill-opacity="0.20"/>

  <!-- Compass ticks -->
  <line x1="40" y1="5"  x2="40" y2="9"  stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="40" y1="71" x2="40" y2="75" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.40"/>
  <line x1="5"  y1="40" x2="9"  y2="40" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.40"/>
  <line x1="71" y1="40" x2="75" y2="40" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.40"/>

  <!-- Wordmark — light version (white text on dark bg) -->
  <text x="96" y="52"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700" font-size="36" letter-spacing="-0.5"
        fill="#F97316">Act</text>
  <text x="155" y="52"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="700" font-size="36" letter-spacing="-0.5"
        fill="#ffffff">ober</text>
  <text x="98" y="68"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="400" font-size="11" letter-spacing="4.5"
        fill="#F97316" fill-opacity="0.70">AI GUIDANCE</text>
</svg>
