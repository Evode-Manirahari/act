<svg width="1160" height="760" viewBox="0 0 1160 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Example ACT training card</title>
  <desc id="desc">A stylized ACT lesson card in the Field Instrument design system: expert reasoning, a novice trap, a lockout-style safety boundary, and a quiz.</desc>

  <!-- ink bezel -->
  <rect width="1160" height="760" fill="#14181F"/>

  <!-- card surface -->
  <rect x="30" y="30" width="1100" height="700" rx="8" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1"/>

  <!-- clip thumbnail -->
  <rect x="70" y="70" width="1020" height="130" rx="6" fill="#14181F"/>
  <circle cx="96" cy="100" r="5" fill="#EA580C"/>
  <text x="110" y="105" font-family="'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">REC</text>
  <text x="160" y="105" font-family="'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1" fill="#8A929C">ACT CAPTURE</text>
  <text x="1064" y="105" text-anchor="end" font-family="'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700" letter-spacing="0.5" fill="#EA580C">TEACHABLE MOMENT 2:01</text>
  <!-- abstract unit + gauge glyph -->
  <rect x="500" y="118" width="120" height="56" rx="4" fill="none" stroke="#586170" stroke-width="2"/>
  <circle cx="560" cy="146" r="17" fill="none" stroke="#586170" stroke-width="2"/>
  <circle cx="560" cy="146" r="3" fill="#586170"/>
  <circle cx="676" cy="134" r="10" fill="none" stroke="#EA580C" stroke-width="2"/>
  <circle cx="706" cy="134" r="10" fill="none" stroke="#586170" stroke-width="2"/>

  <!-- title -->
  <text x="70" y="264" font-family="Geist, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="-0.4" fill="#14181F">Frost on the suction line means</text>
  <text x="70" y="310" font-family="Geist, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="-0.4" fill="#14181F">airflow first, not charge</text>

  <!-- squared instrument tags -->
  <rect x="70" y="336" width="70" height="32" rx="4" fill="#FFF4ED"/>
  <text x="84" y="357" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#C2410C">HVAC</text>

  <rect x="152" y="336" width="196" height="32" rx="4" fill="#DCFCE7"/>
  <text x="166" y="357" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#15803D">COMPANY-APPROVED</text>

  <rect x="360" y="336" width="142" height="32" rx="4" fill="#E4E7EB"/>
  <text x="374" y="357" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#2B313B">REFRIGERANT</text>

  <rect x="514" y="336" width="102" height="32" rx="4" fill="#E4E7EB"/>
  <text x="528" y="357" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#2B313B">AIRFLOW</text>

  <!-- cost-anchor chip: orange left rule, one hi-vis color used sparingly -->
  <rect x="70" y="384" width="640" height="40" fill="#FFF4ED"/>
  <rect x="70" y="384" width="4" height="40" fill="#EA580C"/>
  <text x="94" y="409" font-family="'Geist Mono', ui-monospace, monospace" font-size="15" font-weight="800" letter-spacing="0.5" fill="#C2410C">CALLBACK AVOIDED · COMPRESSOR PROTECTED</text>

  <!-- expert reasoning: neutral steel accent, not a colored panel -->
  <rect x="70" y="448" width="600" height="140" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <rect x="70" y="448" width="4" height="140" fill="#2B313B"/>
  <text x="96" y="480" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" font-weight="800" letter-spacing="1" fill="#586170">EXPERT REASONING</text>
  <text x="96" y="514" font-family="Geist, -apple-system, Arial, sans-serif" font-size="19" font-weight="500" fill="#14181F">Low charge can frost too, but it would not leave</text>
  <text x="96" y="542" font-family="Geist, -apple-system, Arial, sans-serif" font-size="19" font-weight="500" fill="#14181F">the return warm. Warm return plus frost means</text>
  <text x="96" y="570" font-family="Geist, -apple-system, Arial, sans-serif" font-size="19" font-weight="500" fill="#14181F">starved airflow before touching refrigerant.</text>

  <!-- novice trap: caution tint + left rule, danger-mark bullets -->
  <rect x="70" y="602" width="600" height="88" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5"/>
  <rect x="70" y="602" width="4" height="88" fill="#B45309"/>
  <text x="96" y="632" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" font-weight="800" letter-spacing="1" fill="#B45309">NOVICE TRAP</text>
  <text x="96" y="660" font-family="Geist, -apple-system, Arial, sans-serif" font-size="16" font-weight="600" fill="#14181F">✕ Adding refrigerant to a starved coil</text>
  <text x="96" y="684" font-family="Geist, -apple-system, Arial, sans-serif" font-size="16" font-weight="600" fill="#14181F">overcharges and can slug the compressor.</text>

  <!-- safety boundary: lockout panel, heavy rule, reads loud -->
  <rect x="694" y="448" width="396" height="140" fill="#FDEBEB" stroke="#C81E1E" stroke-width="1.5"/>
  <rect x="694" y="448" width="6" height="140" fill="#C81E1E"/>
  <circle cx="724" cy="474" r="10" fill="#C81E1E"/>
  <text x="724" y="479" text-anchor="middle" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="900" fill="#FFFFFF">!</text>
  <text x="746" y="479" font-family="'Geist Mono', ui-monospace, monospace" font-size="14" font-weight="800" letter-spacing="1" fill="#C81E1E">SAFETY BOUNDARY</text>
  <text x="720" y="518" font-family="Geist, -apple-system, Arial, sans-serif" font-size="18" font-weight="600" fill="#14181F">Recover refrigerant before opening</text>
  <text x="720" y="546" font-family="Geist, -apple-system, Arial, sans-serif" font-size="18" font-weight="600" fill="#14181F">any line. Do not vent — EPA 608.</text>

  <!-- primary action: the one hi-vis color, reserved for the CTA -->
  <rect x="694" y="602" width="396" height="56" rx="6" fill="#EA580C"/>
  <text x="892" y="636" text-anchor="middle" font-family="Geist, -apple-system, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">TAKE THE QUIZ →</text>

  <line x1="70" y1="706" x2="1090" y2="706" stroke="#E4E7EB" stroke-width="2"/>
  <text x="70" y="726" font-family="'Geist Mono', ui-monospace, monospace" font-size="13" font-weight="700" letter-spacing="0.5" fill="#586170">SOURCE: SENIOR TECH DEBRIEF · REVIEWED BY LEAD TECH · PUBLISHED TO LEARN LIBRARY</text>
</svg>
